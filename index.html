<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bol Carter Portfolio</title>
    <style>
        body {
            background: linear-gradient(135deg, #101B3A, #2563eb, #1e3a8a);
            background-attachment: fixed;
            color: #EFEDDA;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .section {
            margin: 20px auto;
            max-width: 800px;
            width: 100%;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }
        .secret-input {
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-align: center;
        }
        .btn {
            margin-top: 10px;
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid white;
            background: transparent;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="main-name">Bol Carter</h1>
        <p>Software Developer</p>
    </header>

    <div class="section">
        <h2 id="title-who">Who is me?</h2>
        <p>Looking for the truth in the code and space-time.</p>
        <input type="password" id="secretKey" class="secret-input" placeholder="Enter Secret Key">
        <br>
        <button class="btn" onclick="revealIdentity()">Unlock Identity</button>
    </div>

    <script>
        function revealIdentity() {
            const key = document.getElementById('secretKey').value;
            const name = document.getElementById('main-name');
            // كلمة السر هي اسمك بالإنجليزية
            if (key === "Anas") {
                name.innerText = "Anas Al-Taie";
                name.style.color = "#FFD700";
                document.getElementById('title-who').innerText = "Identity Confirmed";
                alert("Access Granted: Welcome Anas!");
            } else {
                alert("Access Denied: Wrong Key!");
            }
        }
    </script>
</body>
</html>
